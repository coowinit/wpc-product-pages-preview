<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" role="img" aria-labelledby="title desc">
  <title id="title">Contemporary grey deck scene</title>
  <desc id="desc">A vector modern patio scene using contemporary grey composite decking.</desc>
  <defs>
    <linearGradient id="wall" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f9fafb"/>
      <stop offset="1" stop-color="#e5e7eb"/>
    </linearGradient>
    <pattern id="deck" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M0 46 H48" stroke="#6f7780" stroke-width="3" opacity="0.45"/>
      <path d="M12 8 C20 2 31 16 44 8" fill="none" stroke="#2e343a" opacity="0.14"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="800" height="620" fill="url(#wall)"/>
  <rect x="0" y="342" width="800" height="278" fill="#a9b0b6"/>
  <rect x="0" y="342" width="800" height="278" fill="url(#deck)"/>
  <path d="M0 342 H800 L760 620 H40 Z" fill="#000" opacity="0.05"/>
  <g stroke="#cfd4d9" stroke-width="2" opacity="0.65">
    <path d="M80 80 H720 M80 142 H720 M80 204 H720 M80 266 H720"/>
    <path d="M165 60 V318 M315 60 V318 M465 60 V318 M615 60 V318"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="230" y="270" width="340" height="84" rx="12" fill="#fff"/>
    <rect x="250" y="286" width="300" height="26" rx="5" fill="#6d747b"/>
    <rect x="250" y="322" width="300" height="12" rx="5" fill="#c8cdd1"/>
  </g>
  <g transform="translate(407 258) scale(-1 1)" filter="url(#shadow)">
    <g transform="rotate(-24)"><rect x="-46" y="-95" width="92" height="190" rx="7" fill="#333b42"/></g>
    <g transform="rotate(-8)"><rect x="-46" y="-102" width="92" height="204" rx="7" fill="#69717a"/></g>
    <g transform="rotate(8)"><rect x="-46" y="-102" width="92" height="204" rx="7" fill="#c6ccd1"/></g>
    <g transform="rotate(24)"><rect x="-46" y="-94" width="92" height="188" rx="7" fill="#edf0f2"/></g>
  </g>
  <g transform="translate(625 395)">
    <rect x="-24" y="36" width="48" height="65" rx="7" fill="#9a9a8d"/>
    <circle cx="0" cy="10" r="40" fill="#61765e"/>
    <circle cx="-30" cy="24" r="25" fill="#7f956b"/>
    <circle cx="30" cy="24" r="25" fill="#4f654d"/>
  </g>
</svg>
