<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Category Page</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="page-wrap">
    <header class="page-header">
      <p class="eyebrow">Sample Store</p>
      <h1>Composite Products Category Page</h1>
      <p class="page-desc">带产品分类筛选、hover 双图切换、数量选择和分页功能的完整产品分类页示例。</p>
    </header>

    <nav class="category-filter" aria-label="Product category filter">
      <button class="filter-btn is-active" type="button" data-category="all">All</button>
      <button class="filter-btn" type="button" data-category="decking">Decking</button>
      <button class="filter-btn" type="button" data-category="wall">Wall Cladding</button>
      <button class="filter-btn" type="button" data-category="fencing">Fencing</button>
      <button class="filter-btn" type="button" data-category="accessories">Accessories</button>
    </nav>

    <section id="productGrid" class="product-grid" aria-label="Product list" aria-live="polite"></section>

    <p id="emptyState" class="empty-state" hidden>当前分类暂无产品。</p>

    <nav id="pagination" class="pagination" aria-label="Product pagination"></nav>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
