      <path d="M0 4 C6 0 10 8 18 4 M0 11 C7 15 11 8 18 12" fill="none" stroke="#111" stroke-opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="800" height="620" fill="#f7f4ea"/>
