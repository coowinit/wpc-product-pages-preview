  <path d="M108 480 C182 460 220 486 282 452 C344 414 382 430 442 404" fill="none" stroke="#4f3a2c" stroke-width="5" stroke-linecap="round" opacity="0.34"/>
  <g transform="translate(398 296) scale(-1 1)" filter="url(#shadow)">
