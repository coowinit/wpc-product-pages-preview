<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" role="img" aria-labelledby="title desc">
  <title id="title">Warm decking patio scene</title>
  <desc id="desc">A clean vector patio scene with decking, plants, and a sample board display.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fbf7ef"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <pattern id="deckLines" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M0 42 H44" stroke="#7a5e45" stroke-opacity="0.35" stroke-width="3"/>
      <path d="M8 10 C18 0 26 20 42 8" fill="none" stroke="#664a37" stroke-opacity="0.16"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="800" height="620" fill="url(#sky)"/>
  <rect x="0" y="360" width="800" height="260" fill="#a7815e"/>
  <rect x="0" y="360" width="800" height="260" fill="url(#deckLines)"/>
  <path d="M65 360 L735 360 L800 620 L0 620 Z" fill="#000" opacity="0.04"/>
  <g transform="translate(120 120)" stroke="#5b4a3a" stroke-width="14" opacity="0.65">
    <path d="M0 15 H560"/>
    <path d="M30 15 V230"/>
    <path d="M530 15 V230"/>
    <path d="M120 15 V160 M250 15 V160 M380 15 V160" stroke-width="8"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="270" y="245" width="260" height="70" rx="12" fill="#efe2c7"/>
    <rect x="285" y="265" width="230" height="22" rx="4" fill="#c9ad7d"/>
    <circle cx="330" cy="245" r="16" fill="#6d7d4d"/>
    <circle cx="360" cy="235" r="14" fill="#98a75d"/>
    <circle cx="385" cy="248" r="18" fill="#718a52"/>
  </g>
  <g transform="translate(406 318) rotate(-8)" filter="url(#shadow)">
    <rect x="-70" y="-92" width="140" height="184" rx="8" fill="#d8c7a1"/>
    <path d="M-52 -60 H52 M-52 -24 H52 M-52 12 H52 M-52 48 H52" stroke="#8c785b" opacity="0.35"/>
  </g>
  <g transform="translate(572 398)">
    <rect x="-28" y="30" width="56" height="70" rx="8" fill="#bd9b68"/>
    <circle cx="0" cy="0" r="42" fill="#5b7a4e"/>
    <circle cx="-28" cy="15" r="28" fill="#78945b"/>
    <circle cx="30" cy="18" r="25" fill="#456d45"/>
  </g>
</svg>
