<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" role="img" aria-labelledby="title desc">
  <title id="title">Reversed sample kit with stacked decking boards</title>
  <desc id="desc">A vector product image showing mirrored decking samples with warm neutral colours.</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.16"/>
    </filter>
    <pattern id="fineGrain" width="22" height="14" patternUnits="userSpaceOnUse">
      <path d="M0 4 C7 1 12 8 22 3 M0 10 C7 13 14 7 22 12" fill="none" stroke="#2a2a2a" stroke-opacity="0.13" stroke-width="1"/>
    </pattern>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfbf7"/>
      <stop offset="1" stop-color="#eee8d8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="620" fill="url(#bg)"/>
  <g opacity="0.8">
    <circle cx="590" cy="120" r="18" fill="#7c8a61"/>
    <circle cx="623" cy="102" r="15" fill="#9ba46b"/>
    <circle cx="655" cy="133" r="20" fill="#66784e"/>
    <circle cx="132" cy="488" r="16" fill="#96a86a"/>
    <circle cx="105" cy="455" r="20" fill="#66784e"/>
  </g>
  <g transform="translate(400 318) scale(-1 1)" filter="url(#softShadow)">
    <g transform="rotate(-8)">
      <rect x="-165" y="-150" width="330" height="108" rx="10" fill="#85725d"/>
      <rect x="-165" y="-150" width="330" height="108" rx="10" fill="url(#fineGrain)"/>
      <rect x="-165" y="-42" width="330" height="18" rx="6" fill="#5d4e42"/>
    </g>
    <g transform="translate(-55 35) rotate(8)">
      <rect x="-160" y="-70" width="320" height="112" rx="10" fill="#d9c99d"/>
      <rect x="-160" y="-70" width="320" height="112" rx="10" fill="url(#fineGrain)"/>
      <rect x="-160" y="42" width="320" height="18" rx="6" fill="#a99462"/>
    </g>
    <g transform="translate(110 90) rotate(-4)">
      <rect x="-150" y="-70" width="300" height="112" rx="10" fill="#9a9d8c"/>
      <rect x="-150" y="-70" width="300" height="112" rx="10" fill="url(#fineGrain)"/>
      <rect x="-150" y="42" width="300" height="18" rx="6" fill="#686d60"/>
    </g>
    <g transform="translate(25 -105) rotate(6)">
      <rect x="-135" y="-58" width="270" height="96" rx="10" fill="#b88f68"/>
      <rect x="-135" y="-58" width="270" height="96" rx="10" fill="url(#fineGrain)"/>
      <rect x="-135" y="38" width="270" height="17" rx="6" fill="#806047"/>
    </g>
  </g>
  <g opacity="0.55" fill="#7a6a54">
    <ellipse cx="126" cy="170" rx="30" ry="14"/>
    <ellipse cx="174" cy="144" rx="24" ry="12"/>
    <ellipse cx="640" cy="430" rx="36" ry="16"/>
  </g>
</svg>
